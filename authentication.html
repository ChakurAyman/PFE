<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/auth.css">
    <title>Sign In / Sign Up</title>
</head>
<body>
    <main class="auth-page">
        <section class="auth-card">
            <div class="auth-header">
                <h1>Welcome Back</h1>
                <p>Login or create an account to continue with your projects.</p>
            </div>
            <div class="auth-forms">
                <form class="auth-form auth-form--active" id="signInForm">
                    <h2>Sign In</h2>
                    <div class="input-group">
                        <label for="signin-email">Email</label>
                        <input id="signin-email" type="email" placeholder="you@example.com" required>
                    </div>
                    <div class="input-group">
                        <label for="signin-password">Password</label>
                        <input id="signin-password" type="password" placeholder="Enter password" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Sign In
                        <a href="index.html"></a>
                    </button>
                    <p class="text-muted">Don’t have an account? <button type="button" class="link-button" id="showSignUp">Create one</button></p>
                </form>
                <form class="auth-form" id="signUpForm">
                    <h2>Sign Up</h2>
                    <div class="input-group">
                        <label for="signup-name">Full Name</label>
                        <input id="signup-name" type="text" placeholder="Your name" required>
                    </div>
                    <div class="input-group">
                        <label for="signup-email">Email</label>
                        <input id="signup-email" type="email" placeholder="you@example.com" required>
                    </div>
                    <div class="input-group">
                        <label for="signup-password">Password</label>
                        <input id="signup-password" type="password" placeholder="Create a password" required>
                    </div>
                    <button type="submit" class="btn btn-secondary">Create Account</button>
                    <p class="text-muted">Already have an account? <button type="button" class="link-button" id="showSignIn">Sign in</button></p>
                </form>
            </div>
        </section>
    </main>
    <script src="assets/scripts/auth.js"></script>
</body>
</html>
